; PlatformIO Project Configuration File
; IMPORTANT RULES:
; - Keep this file stable. Do NOT rewrite it every time.
; - When you need a new external library, ONLY append it under lib_deps.
; - All comments are intentionally in English (as requested).

[platformio]
default_envs = gen4_esp32s3_r8n16
boards_dir = boards

; ---------------------------
; Common settings (shared)
; ---------------------------
[env]
framework = arduino
monitor_speed = 115200
monitor_filters = time
lib_extra_dirs = lib/Sensors

build_flags =
  ; Local include paths for IntelliSense and config structure
  -I lib/PrintController/src
  -I lib/RS485ModBus/src
  -I lib/Sensors
  -I config
  -I pcb

  ; Optional global debug placeholder
  -D DEBUG_MODE_DEFAULT=0

lib_deps =
  ; Add external libs here ONLY when needed (append new lines)
  ; Example:
  ; frankboesing/FastCRC@^1.41

; ---------------------------
; ESP32-S3 GEN4 (main target)
; ---------------------------
[env:gen4_esp32s3_r8n16]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
upload_speed = 921600
monitor_speed = 115200

; ---------------------------
; Mega2560 (optional test target)
; ---------------------------
[env:mega2560]
platform = atmelavr
board = megaatmega2560
monitor_speed = 115200

; ---------------------------
; Example: Rika Leaf Sensor
; ---------------------------
[env:rika_leaf_sensor_example]
extends = env:gen4_esp32s3_r8n16
build_src_filter =
  -<*>
  +<../examples/RikaLeafSensor_Example/src/>

