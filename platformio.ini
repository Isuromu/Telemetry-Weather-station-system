; PlatformIO Project Configuration File
; IMPORTANT RULES:
; - Keep this file stable. Do NOT rewrite it every time.
; - When you need a new external library, ONLY append it under lib_deps.
; - All comments are intentionally in English (as requested).

[platformio]
default_envs = station_esp32s3_v2
boards_dir = boards

; ---------------------------
; Common settings (shared)
; ---------------------------
[env]
framework = arduino
monitor_speed = 115200
monitor_filters = time
lib_extra_dirs = lib/Sensors

build_flags =
  ; Local include paths for IntelliSense and config structure
  -I lib/PrintController/src
  -I lib/RS485ModBus/src
  -I lib/Sensors
  -I config
  -I pcb

  ; Optional global debug placeholder
  -D DEBUG_MODE_DEFAULT=0

lib_deps =
  ; Add external libs here ONLY when needed (append new lines)
  ; Example:
  ; frankboesing/FastCRC@^1.41

; ---------------------------
; ESP32-S3 GEN4 (main target)
; Raw MCU target. Do not build directly unless a PCB_PROFILE_* flag is added.
; ---------------------------
[env:gen4_esp32s3_r8n16]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
upload_speed = 921600
monitor_speed = 115200

; ---------------------------
; Mega2560 (optional test target)
; Raw MCU target. Do not build directly unless a PCB_PROFILE_* flag is added.
; ---------------------------
[env:mega2560]
platform = atmelavr
board = megaatmega2560
monitor_speed = 115200

; ---------------------------
; Station / PCB profiles
; ---------------------------
; Every firmware/example env below extends one of these profiles.
; To move an example to another PCB, change only its "extends" line.

[env:station_esp32s3_v2]
extends = env:gen4_esp32s3_r8n16
build_flags =
  ${env.build_flags}
  -D PCB_PROFILE_ESP32S3_V2

[env:station_esp32s3_v2_test]
extends = env:gen4_esp32s3_r8n16
build_flags =
  ${env.build_flags}
  -D PCB_PROFILE_ESP32S3_V2_TEST

[env:station_mega2560_v1]
extends = env:mega2560
build_flags =
  ${env.build_flags}
  -D PCB_PROFILE_MEGA2560_V1

; ---------------------------
; Example: Rika Leaf Sensor
; ---------------------------
[env:rika_leaf_sensor_example]
extends = env:station_esp32s3_v2
build_src_filter =
  -<*>
  +<../examples/RikaLeafSensor_Example/src/>

